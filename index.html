<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Atomic Simulator</title>
    <link rel="stylesheet" href="style.css">
    
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="top-panel">
        <div class="title">Quantum Atomic Simulator</div>
        <div class="stats-grid">
            <div class="stat-col"><div class="stat-label">DESIGNATION</div><div class="stat-val designation" id="orbital-name">3p</div></div>
            <div class="stat-col"><div class="stat-label">N</div><div class="stat-val" id="n-val-header">3</div></div>
            <div class="stat-col"><div class="stat-label">L</div><div class="stat-val" id="l-val-header">1</div></div>
            <div class="stat-col"><div class="stat-label">M</div><div class="stat-val" id="m-val-header">1</div></div>
        </div>
    </div>

    <div id="bottom-panel">
        <div class="controls-grid">
            <label>n (Principal)</label>
            <input type="range" id="n-slider" min="1" max="7" value="3">
            <div class="val-box" id="n-val">3</div>

            <label>l (Azimuthal)</label>
            <input type="range" id="l-slider" min="0" max="2" value="1">
            <div class="val-box" id="l-val">1</div>

            <label>m (Magnetic)</label>
            <input type="range" id="m-slider" min="-1" max="1" value="1">
            <div class="val-box" id="m-val">1</div>

            <label>Density</label>
            <input type="range" id="density-slider" min="0.1" max="1.0" step="0.1" value="0.6">
            <div class="val-box" id="density-val">0.6</div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
